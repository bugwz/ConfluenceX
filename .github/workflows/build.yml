name: Build Packages

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build extension packages
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (full history required for git describe) ──────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Compute artifact name ─────────────────────────────────────────────
      #
      # Naming convention:
      #   ConfluenceX_{version}-{distance}-g{hash}_{platform}.{ext}
      #
      # - version   : from package.json  (e.g. 0.0.0)
      # - distance  : commits since previous valid tag (excludes build/* tags);
      #               if no valid tag exists, use total commits
      # - hash      : 7-char short SHA of HEAD
      - name: Compute version info
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Distance from previous valid tag, excluding CI build/* tags.
          if git describe --tags --abbrev=0 --exclude='build/*' 2>/dev/null; then
            LAST_TAG=$(git describe --tags --abbrev=0 --exclude='build/*')
            DISTANCE=$(git rev-list "${LAST_TAG}..HEAD" --count)
          else
            # No valid tags yet: distance = total commit count (1-based)
            DISTANCE=$(git rev-list HEAD --count)
          fi

          SHORT_HASH=$(git rev-parse --short=7 HEAD)

          # Full artifact base name (no extension, no platform suffix yet)
          ARTIFACT_BASE="ConfluenceX_${VERSION}-${DISTANCE}-g${SHORT_HASH}"

          echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"
          echo "distance=${DISTANCE}"         >> "$GITHUB_OUTPUT"
          echo "short_hash=${SHORT_HASH}"     >> "$GITHUB_OUTPUT"
          echo "artifact_base=${ARTIFACT_BASE}" >> "$GITHUB_OUTPUT"

          echo "### Version info"
          echo "version      : ${VERSION}"
          echo "distance     : ${DISTANCE}"
          echo "short_hash   : ${SHORT_HASH}"
          echo "artifact_base: ${ARTIFACT_BASE}"

      # ── Build Chrome & Firefox zips ───────────────────────────────────────
      - name: Build
        run: bash build.sh all

      # ── Verify manifests contain default_locale when _locales exists ──────
      - name: Validate packaged manifests
        run: |
          check_pkg() {
            local pkg="$1"
            local platform="$2"

            echo "Validating ${pkg} (${platform})"

            if unzip -l "${pkg}" | grep -q "_locales/"; then
              if ! unzip -p "${pkg}" manifest.json | grep -q '"default_locale"[[:space:]]*:[[:space:]]*"en"'; then
                echo "ERROR: ${pkg} contains _locales but manifest.json is missing default_locale=en"
                exit 1
              fi
            fi

            echo "OK: ${pkg}"
          }

          check_pkg confluencex-chrome.zip chrome
          check_pkg confluencex-firefox.zip firefox

      # ── Rename zips and produce tar.gz / xpi ─────────────────────────────
      - name: Package artifacts
        env:
          BASE: ${{ steps.ver.outputs.artifact_base }}
        run: |
          # ── Chrome ──
          # zip (rename)
          mv confluencex-chrome.zip "${BASE}_chrome.zip"

          # tar.gz (repack from zip contents)
          mkdir -p /tmp/chrome
          unzip -q "${BASE}_chrome.zip" -d /tmp/chrome
          tar -czf "${BASE}_chrome.tar.gz" -C /tmp/chrome .

          # ── Firefox ──
          # zip (rename)
          mv confluencex-firefox.zip "${BASE}_firefox.zip"

          # xpi (Firefox signed package — structurally identical to zip)
          cp "${BASE}_firefox.zip" "${BASE}_firefox.xpi"

          # tar.gz
          mkdir -p /tmp/firefox
          unzip -q "${BASE}_firefox.zip" -d /tmp/firefox
          tar -czf "${BASE}_firefox.tar.gz" -C /tmp/firefox .

          echo "--- Artifacts ---"
          ls -lh "${BASE}"_*

      # ── SHA-256 checksums ─────────────────────────────────────────────────
      - name: Compute SHA-256
        env:
          BASE: ${{ steps.ver.outputs.artifact_base }}
        run: |
          sha256sum \
            "${BASE}_chrome.zip" \
            "${BASE}_chrome.tar.gz" \
            "${BASE}_firefox.zip" \
            "${BASE}_firefox.xpi" \
            "${BASE}_firefox.tar.gz" \
            > checksums.txt
          echo "--- SHA-256 ---"
          cat checksums.txt

      # ── Build artifact notes ──────────────────────────────────────────────
      - name: Build artifact notes
        env:
          BASE:      ${{ steps.ver.outputs.artifact_base }}
          VERSION:   ${{ steps.ver.outputs.version }}
          DISTANCE:  ${{ steps.ver.outputs.distance }}
          SHORT_HASH: ${{ steps.ver.outputs.short_hash }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_BODY=$(git log -1 --pretty=format:"%b")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ci")

          cat > artifact_notes.md << EOF
          ## ${BASE}

          | Field | Value |
          |-------|-------|
          | Version | \`${VERSION}\` |
          | Commits since last tag | \`${DISTANCE}\` |
          | Commit | \`${SHORT_HASH}\` |
          | Author | ${COMMIT_AUTHOR} |
          | Date | ${COMMIT_DATE} |

          **${COMMIT_MSG}**
          EOF

          if [ -n "${COMMIT_BODY}" ]; then
            echo "" >> artifact_notes.md
            echo "${COMMIT_BODY}" >> artifact_notes.md
          fi

          cat >> artifact_notes.md << 'EOF'

          ---

          ### SHA-256 Checksums
          EOF

          while IFS= read -r line; do
            HASH=$(echo "$line" | awk '{print $1}')
            FILE=$(echo "$line" | awk '{print $2}')
            echo "- \`${FILE}\`  " >> artifact_notes.md
            echo "  \`sha256:${HASH}\`" >> artifact_notes.md
          done < checksums.txt

          echo "--- Artifact notes ---"
          cat artifact_notes.md

      # ── Upload workflow artifacts (no auto tag/release) ──────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact_base }}
          path: |
            ${{ steps.ver.outputs.artifact_base }}_chrome.zip
            ${{ steps.ver.outputs.artifact_base }}_chrome.tar.gz
            ${{ steps.ver.outputs.artifact_base }}_firefox.zip
            ${{ steps.ver.outputs.artifact_base }}_firefox.xpi
            ${{ steps.ver.outputs.artifact_base }}_firefox.tar.gz
            checksums.txt
            artifact_notes.md
